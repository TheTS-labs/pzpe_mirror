services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  serverless-redis:
    image: hiett/serverless-redis-http:latest
    ports:
      - "8080:80"
    environment:
      - SRH_MODE=env
      - SRH_TOKEN=api_token
      - SRH_CONNECTION_STRING=redis://redis:6379
    depends_on:
      - redis

  app:
    build: 
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - KV_REST_API_URL=http://serverless-redis:80
      - KV_REST_API_TOKEN=api_token
    depends_on:
      - serverless-redis

volumes:
  redis_data: